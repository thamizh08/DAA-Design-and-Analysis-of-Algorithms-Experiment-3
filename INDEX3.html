<meta charset="UTF-8">

<title>MST Algorithms Visualizer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{

background:linear-gradient(135deg,#0eaed6,#b50ccf);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.container{

width:950px;

background:white;

border-radius:20px;

padding:35px;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}

h1{

text-align:center;

color:#040e12;

margin-bottom:25px;

}

label{

display:block;

}

}

}

}

}

table{

width:100%;

margin-top:20px;

border-collapse:collapse;

}

th{

background:#1d2671;

color:white;

padding:12px;

}

td{

padding:12px;

border:1px solid #ddd;

}

tr:nth-child(even){

background:#f9f9f9;

}
.btn-group{

display:flex;

gap:20px;

margin-top:25px;

}

flex:1;

<body>

<div class="container">

<h1>Minimum Spanning Tree Algorithms</h1>

<label>Number of Vertices</label>

<input
type="number"
id="vertices"
value="7">

<label>Edges (Weight Source Destination)</label>

<textarea id="edges" rows="12">
7 0 1
5 0 3
8 1 2
9 1 3
7 1 4
5 2 4
15 3 4
6 3 5
8 4 5
9 4 6
11 5 6
</textarea>

<div class="btn-group">

<button onclick="runKruskal()">
Run Kruskal
</button>

<button onclick="runPrim()">
Run Prim
</button>

<button onclick="runBoth()">
Compare Both
</button>

</div>

<h2 style="margin-top:30px;">Results</h2>

<div id="output"></div>

<h2 style="margin-top:30px;">Comparison</h2>

<table id="comparison">

<tr>

<th>Algorithm</th>

<th>Total Cost</th>

<th>Edges in MST</th>

</tr>

</table>

</div>

<script>

class UnionFind{

constructor(n){

this.parent=[];

this.rank=[];

for(let i=0;i<n;i++){

this.parent.push(i);

this.rank.push(0);

}

}

find(x){

if(this.parent[x]!=x)

this.parent[x]=this.find(this.parent[x]);

return this.parent[x];

}

union(x,y){

let rx=this.find(x);

let ry=this.find(y);

if(rx==ry)

return false;

if(this.rank[rx]<this.rank[ry]){

let t=rx;

rx=ry;

ry=t;

}

this.parent[ry]=rx;

if(this.rank[rx]==this.rank[ry])

this.rank[rx]++;

return true;

}

}
function kruskal(n, edges){

    edges.sort((a,b)=>a.weight-b.weight);

    let uf = new UnionFind(n);

    let mst = [];

    let cost = 0;

    for(let edge of edges){

        if(uf.union(edge.u, edge.v)){

            mst.push(edge);

            cost += edge.weight;

            if(mst.length === n-1)
                break;
        }
    }

    return {
        mst: mst,
        cost: cost
    };
}



function prim(n, adj){

    let visited = new Array(n).fill(false);

    let pq = [];

    let mst = [];

    let cost = 0;

    pq.push({
        weight:0,
        node:0,
        parent:-1
    });

    while(pq.length){

        pq.sort((a,b)=>a.weight-b.weight);

        let cur = pq.shift();

        if(visited[cur.node])
            continue;

        visited[cur.node] = true;

        if(cur.parent != -1){

            mst.push({

                u:cur.parent,

                v:cur.node,

                weight:cur.weight

            });

            cost += cur.weight;

        }

        for(let edge of adj[cur.node]){

            if(!visited[edge.node]){

                pq.push({

                    weight:edge.weight,

                    node:edge.node,

                    parent:cur.node

                });

            }

        }

    }

    return{

        mst:mst,

        cost:cost

    };

}



function buildAdjacency(n, edges){

    let adj=[];

    for(let i=0;i<n;i++)
        adj.push([]);

    for(let edge of edges){

        adj[edge.u].push({

            node:edge.v,

            weight:edge.weight

        });

        adj[edge.v].push({

            node:edge.u,

            weight:edge.weight

        });

    }

    return adj;

}



function formatMST(title,result){

    let html="";

    html+="<h3>"+title+"</h3>";

    html+="<table>";

    html+="<tr>";

    html+="<th>Source</th>";

    html+="<th>Destination</th>";

    html+="<th>Weight</th>";

    html+="</tr>";

    result.mst.forEach(edge=>{

        html+="<tr>";

        html+="<td>"+edge.u+"</td>";

        html+="<td>"+edge.v+"</td>";

        html+="<td>"+edge.weight+"</td>";

        html+="</tr>";

    });

    html+="</table>";

    html+="<h3>Total MST Cost : "+result.cost+"</h3>";

    return html;

}
 function getGraph(){

    let n = parseInt(document.getElementById("vertices").value);

    let lines = document.getElementById("edges").value.trim().split("\n");

    let edges=[];

    for(let line of lines){

        let p=line.trim().split(/\s+/);

        if(p.length!=3) continue;

        edges.push({

            weight:parseInt(p[0]),

            u:parseInt(p[1]),

            v:parseInt(p[2])

        });

    }

    let adj=buildAdjacency(n,edges);

    return {n,edges,adj};

}
function runKruskal(){

    let graph=getGraph();

    let result=kruskal(graph.n,[...graph.edges]);

    document.getElementById("output").innerHTML=

    formatMST("Kruskal's MST",result);

}
function runPrim(){

    let graph=getGraph();

    let result=prim(graph.n,graph.adj);

    document.getElementById("output").innerHTML=

    formatMST("Prim's MST",result);

}
function runBoth(){

    let graph=getGraph();

    let k=kruskal(graph.n,[...graph.edges]);

    let p=prim(graph.n,graph.adj);

    document.getElementById("output").innerHTML=

    formatMST("Kruskal's MST",k)

    +

    "<br><br>"

    +

    formatMST("Prim's MST",p);

    document.getElementById("comparison").innerHTML=`

    <tr>

    <th>Algorithm</th>

    <th>Total Cost</th>

    <th>Edges</th>

    </tr>

    <tr>

    <td>Kruskal</td>

    <td>${k.cost}</td>

    <td>${k.mst.length}</td>

    </tr>

    <tr>

    <td>Prim</td>

    <td>${p.cost}</td>

    <td>${p.mst.length}</td>

    </tr>

    `;

}


</script>
